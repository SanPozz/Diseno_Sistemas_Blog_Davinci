<!-- Sidebar -->
<aside class="w-72 bg-[var(--color-primary)] border-r border-[var(--color-accent)]/20 shadow-sm sticky top-0 h-screen flex flex-col">
    <div class="p-8">

        <div class="mb-12">
            <span class="text-2xl font-bold antialiased font-['Plus_Jakarta_Sans'] text-[var(--color-secondary)]">Blog</span>
        </div>

        <nav class="space-y-6 mb-12">
            <div>
                <h3 class="text-xs font-semibold text-[var(--color-secondary)]/50 uppercase tracking-wider mb-3">Menú</h3>
                <div class="space-y-2">
                    <a href="/home" class="flex items-center gap-3 px-4 py-2 rounded-lg text-[var(--color-secondary)] hover:bg-[var(--color-shade)] transition-colors font-['Plus_Jakarta_Sans']">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 16l4-4m0 0l4 4m-4-4V5"></path>
                        </svg>
                        Inicio
                    </a>
                    <a href="/auth/profile" class="flex items-center gap-3 px-4 py-2 rounded-lg text-[var(--color-secondary)] hover:bg-[var(--color-shade)] transition-colors font-['Plus_Jakarta_Sans']">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                        </svg>
                        Perfil
                    </a>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-semibold text-[var(--color-secondary)]/50 uppercase tracking-wider mb-3">Filtros</h3>
                <div class="space-y-2">
                    <a href="/home" class="block px-4 py-2 rounded-lg {% if not request.args.get('filter') %}bg-[var(--color-accent)] text-[var(--color-primary)]{% else %}text-[var(--color-secondary)] hover:bg-[var(--color-shade)]{% endif %} transition-colors font-['Plus_Jakarta_Sans'] text-sm font-semibold">Recientes</a>
                    <a href="/home?filter=popular" class="block px-4 py-2 rounded-lg {% if request.args.get('filter') == 'popular' %}bg-[var(--color-accent)] text-[var(--color-primary)]{% else %}text-[var(--color-secondary)] hover:bg-[var(--color-shade)]{% endif %} transition-colors font-['Plus_Jakarta_Sans'] text-sm font-semibold">Populares</a>
                    <a href="/home?filter=views" class="block px-4 py-2 rounded-lg {% if request.args.get('filter') == 'views' %}bg-[var(--color-accent)] text-[var(--color-primary)]{% else %}text-[var(--color-secondary)] hover:bg-[var(--color-shade)]{% endif %} transition-colors font-['Plus_Jakarta_Sans'] text-sm font-semibold">Más Vistos</a>
                </div>
            </div>
        </nav>

        <div class="border-t border-[var(--color-accent)]/10 mb-6"></div>

        <div class="space-y-2">
            <a href="/posts/create" class="flex items-center justify-center gap-2 w-full bg-[var(--color-accent)] px-4 py-3 text-[var(--color-primary)] rounded-lg font-['Plus_Jakarta_Sans'] font-semibold hover:bg-[var(--color-accent)]/80 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Crear Post
            </a>
            <a href="/auth/logout" class="flex items-center justify-center gap-2 w-full px-4 py-2 text-[var(--color-secondary)] border border-[var(--color-accent)]/20 rounded-lg font-['Plus_Jakarta_Sans'] font-semibold hover:bg-[var(--color-shade)] transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                Logout
            </a>
        </div>
    </div>
</aside>
