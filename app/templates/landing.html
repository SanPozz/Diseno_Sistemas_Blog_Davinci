<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Blog</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->

    <nav class="bg-white shadow p-4 flex justify-between items-center">

        <h1 class="text-3xl font-bold">

            Blog Social

        </h1>

        <div class="flex gap-4">

            <a href="/posts/create" class="bg-blue-500 text-white px-4 py-2 rounded">
                Crear publicación
            </a>

            <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded">
                Logout
            </a>

        </div>

    </nav>

    <!-- POSTS -->

    <div class="max-w-7xl mx-auto mt-10 grid grid-cols-3 gap-6">

        {% for post in posts %}

        <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:scale-105 transition">

            <div class="p-6">

                <h2 class="text-2xl font-bold">

                    {{ post.title }}

                </h2>

                <p class="mt-4 text-gray-600">

                    {{ post.content[:150] }}

                </p>

                <div class="mt-6 flex justify-between">

                    <span class="text-sm text-gray-500">

                        {{ post.user.username }}

                    </span>

                    <span class="text-sm text-gray-500">

                        ❤️ {{ post.likes }}

                    </span>

                </div>

                <a href="/posts/{{ post.id }}" class="mt-6 inline-block bg-black text-white px-4 py-2 rounded">
                    Ver publicación
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</body>

</html>
