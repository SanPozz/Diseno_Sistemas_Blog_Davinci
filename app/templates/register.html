<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Blog</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-primary: #FFFFFF;
            --color-secondary: #0F172A;
            --color-accent: #3B82F6;
            --color-shade: #EEF2F6;
        }

        @layer components {
            .auth-gradient {
                background: linear-gradient(
                135deg,
                var(--color-primary) 0%,
                var(--color-shade) 50%,
                rgba(59, 130, 246, 0.1) 100%
                );
            }
        }
    </style>
</head>
<body class="auth-gradient min-h-screen">

    <nav class="w-full h-[10vh] bg-primary/80 backdrop-blur-md flex items-center justify-between px-4 border-b border-[var(--color-accent)]/10">
        <div>
            <a href="/" class="text-xl antialiased font-semibold font-['Plus_Jakarta_Sans'] hover:text-[var(--color-accent)] transition-colors">Blog</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="/login" class="text-[var(--color-secondary)] hover:text-[var(--color-accent)] transition-colors font-['Plus_Jakarta_Sans']">Iniciar Sesión</a>
        </div>
    </nav>

    <div class="flex items-center justify-center min-h-[calc(100vh-10vh)] px-4">
        <div class="w-full max-w-md">
            
            <div class="p-8 rounded-3xl bg-white/40 border-2 border-[var(--color-accent)]/20 backdrop-blur-md shadow-[0_8px_32px_-8px_var(--color-accent)]">
                
                
                <div class="text-center mb-6">
                    <h1 class="text-3xl font-bold text-[var(--color-secondary)] mb-2 font-['Plus_Jakarta_Sans']">Crear Cuenta</h1>
                    <p class="text-[var(--color-secondary)]/60 font-['Plus_Jakarta_Sans']">Únete a nuestra comunidad de escritores</p>
                </div>

                
                <form class="space-y-4">
                    
                    <div class="flex flex-col gap-1.5">
                        <label for="name" class="text-sm font-semibold text-[var(--color-secondary)] font-['Plus_Jakarta_Sans']">Nombre Completo</label>
                        <input type="text" id="name" name="name" placeholder="Juan Pérez" class="px-4 py-3 rounded-xl bg-white/20 border border-[var(--color-accent)]/20 focus:border-[var(--color-accent)]/50 focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]/20 text-[var(--color-secondary)] placeholder-[var(--color-secondary)]/40 font-['Plus_Jakarta_Sans'] transition-all">
                    </div>

                    
                    <div class="flex flex-col gap-1.5">
                        <label for="email" class="text-sm font-semibold text-[var(--color-secondary)] font-['Plus_Jakarta_Sans']">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" class="px-4 py-3 rounded-xl bg-white/20 border border-[var(--color-accent)]/20 focus:border-[var(--color-accent)]/50 focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]/20 text-[var(--color-secondary)] placeholder-[var(--color-secondary)]/40 font-['Plus_Jakarta_Sans'] transition-all">
                    </div>

                    
                    <div class="flex flex-col gap-1.5">
                        <label for="password" class="text-sm font-semibold text-[var(--color-secondary)] font-['Plus_Jakarta_Sans']">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" class="px-4 py-3 rounded-xl bg-white/20 border border-[var(--color-accent)]/20 focus:border-[var(--color-accent)]/50 focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]/20 text-[var(--color-secondary)] placeholder-[var(--color-secondary)]/40 font-['Plus_Jakarta_Sans'] transition-all">
                    </div>

                    
                    <div class="flex flex-col gap-1.5">
                        <label for="confirm" class="text-sm font-semibold text-[var(--color-secondary)] font-['Plus_Jakarta_Sans']">Confirmar Contraseña</label>
                        <input type="password" id="confirm" name="confirm" placeholder="••••••••" class="px-4 py-3 rounded-xl bg-white/20 border border-[var(--color-accent)]/20 focus:border-[var(--color-accent)]/50 focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]/20 text-[var(--color-secondary)] placeholder-[var(--color-secondary)]/40 font-['Plus_Jakarta_Sans'] transition-all">
                    </div>

                    
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="terms" name="terms" class="w-4 h-4 rounded accent-[var(--color-accent)]">
                        <label for="terms" class="text-sm text-[var(--color-secondary)]/70 font-['Plus_Jakarta_Sans']">Acepto los <a href="" class="text-[var(--color-accent)] hover:underline">términos y condiciones</a></label>
                    </div>

                    
                    <button type="submit" class="w-full py-3 mt-6 bg-[var(--color-accent)] text-[var(--color-primary)] rounded-xl font-semibold font-['Plus_Jakarta_Sans'] hover:bg-[var(--color-accent)]/90 hover:shadow-[0_8px_16px_-2px_var(--color-accent)] transition-all active:scale-95">
                        Crear Cuenta
                    </button>
                </form>

                
                <div class="flex items-center gap-3 my-5">
                    <div class="flex-1 h-px bg-[var(--color-accent)]/10"></div>
                    <span class="text-xs text-[var(--color-secondary)]/50">O</span>
                    <div class="flex-1 h-px bg-[var(--color-accent)]/10"></div>
                </div>

                
                <a href="/google/register" class="w-full flex items-center justify-center gap-2 py-3 rounded-xl bg-white/20 border border-[var(--color-accent)]/20 hover:border-[var(--color-accent)]/50 hover:bg-white/30 text-[var(--color-secondary)] font-semibold font-['Plus_Jakarta_Sans'] transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Registrarse con Google
                </a>

                
                <div class="text-center mt-4">
                    <p class="text-[var(--color-secondary)]/70 font-['Plus_Jakarta_Sans']">
                        ¿Ya tienes cuenta? <a href="/login" class="text-[var(--color-accent)] hover:underline font-semibold">Inicia sesión aquí</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
